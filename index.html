<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contagem para Formatura</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e9c3b8;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 20px;
    }

    .logo {
      margin-bottom: 30px;
    }

    .logo img {
      max-width: 180px;
      width: 100%;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    #contador {
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 1px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- LOGO -->
    <!-- Coloque um arquivo chamado "logo.png" no repositório -->
    <div class="logo">
      <img src="logo.png" alt="Logotipo Biomedicina">
    </div>

    <h1>Contagem regressiva para a formatura</h1>
     <div id="contador"></div>
    <p>Turma de Biomedicina — o final está chegando</p>
  </div>

  <script>
    // 🔥 DEFINA A DATA DA FORMATURA AQUI
    const dataAlvo = new Date("2027-06-01T20:00:00").getTime();

    function atualizarContador() {
      const agora = new Date().getTime();
      const diferenca = dataAlvo - agora;

      if (diferenca <= 0) {
        document.getElementById("contador").innerHTML = "Formados. Nova fase iniciada.";
        return;
      }

      const totalDias = Math.floor(diferenca / (1000 * 60 * 60 * 24));

      const anos = Math.floor(totalDias / 365);
      const dias = totalDias % 365;

      const horas = Math.floor((diferenca % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutos = Math.floor((diferenca % (1000 * 60 * 60)) / (1000 * 60));
      const segundos = Math.floor((diferenca % (1000 * 60)) / 1000);

      document.getElementById("contador").innerHTML =
        `${anos}a ${dias}d<br>${horas}h ${minutos}m ${segundos}s`;
    }

    atualizarContador();
    setInterval(atualizarContador, 1000);
  </script>
</body>
</html>
